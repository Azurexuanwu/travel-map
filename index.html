<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>我的旅行足迹</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="china-cities.js"></script>
<script src="china-geo.js?v=2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4"></script>
<style>
:root {
  --primary: #e8590c;
  --primary-light: #f76707;
  --primary-dark: #d9480f;
  --danger: #e03131;
  --bg: #fef9f0;
  --surface: #ffffff;
  --text: #2d2416;
  --text-secondary: #7d6e5d;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 4px 20px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  --radius: 16px;
  --radius-sm: 8px;
  --bubble-width: 360px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #fef9f0 0%, #fdf4e3 30%, #fef3e2 60%, #faf5eb 100%);
  height: 100vh; height: 100dvh; width: 100vw; width: 100dvw;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}

/* 顶部栏 */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.88));
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  z-index: 10;
  flex-shrink: 0;
}
.header .logo {
  font-size: 20px; font-weight: 800;
  background: linear-gradient(135deg, #e8590c, #f08c00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.5px;
}
.header .logo .icon {
  -webkit-text-fill-color: initial;
  margin-right: 8px;
  font-size: 24px;
}
.header .actions { display: flex; gap: 10px; }
.btn {
  padding: 8px 18px; border: none; border-radius: 10px;
  font-size: 14px; cursor: pointer; font-weight: 600;
  transition: all var(--transition);
  font-family: inherit;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  box-shadow: 0 2px 8px rgba(232,89,12,0.3);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(232,89,12,0.4);
}
.btn-outline {
  background: rgba(255,255,255,0.7);
  border: 1.5px solid #e8d5c0;
  color: var(--text);
  backdrop-filter: blur(4px);
}
.btn-outline:hover { background: #fff5eb; border-color: var(--primary); }
.btn-danger {
  background: linear-gradient(135deg, var(--danger), #e8590c);
  color: #fff;
  box-shadow: 0 2px 8px rgba(224,49,49,0.25);
}
.btn-danger:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(224,49,49,0.35);
}
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 8px; }

/* 地图容器 */
.map-container { flex: 1; position: relative; overflow: hidden; }
#map { width: 100%; height: 100%; }

/* 气泡浮层 */
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(8px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.bubble {
  position: absolute;
  width: var(--bubble-width);
  max-width: 90vw;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  z-index: 20;
  display: none;
  overflow: visible;
  animation: bubbleIn 0.25s ease-out;
}
.bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 16px; height: 16px;
  background: var(--surface);
  box-shadow: 3px 3px 8px rgba(0,0,0,0.06);
  z-index: -1;
}
.bubble.visible { display: block; }
.bubble .bubble-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid #f5efe5;
  font-weight: 700; font-size: 16px;
  color: var(--text);
}
.bubble .bubble-close {
  background: #f5efe5; border: none; font-size: 18px; cursor: pointer;
  color: var(--text-secondary); line-height: 1; padding: 2px 8px;
  border-radius: 50%; transition: all var(--transition);
}
.bubble .bubble-close:hover { background: #ffe0cc; color: var(--primary); }
.bubble .bubble-body { padding: 14px 16px; }
.bubble .photo-frame {
  width: 100%; height: 230px;
  border-radius: var(--radius-sm); overflow: hidden;
  background: linear-gradient(135deg, #f5efe5, #faf5eb);
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 1px 4px rgba(0,0,0,0.04);
}
.bubble .photo-frame img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.bubble .photo-frame img:hover { transform: scale(1.03); }
.bubble .photo-frame .no-photo {
  font-size: 56px; opacity: 0.4;
}
.bubble .photo-desc {
  margin-top: 10px; font-size: 13px;
  color: var(--text-secondary); text-align: center;
  font-style: italic;
}
.bubble .photo-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; margin-top: 12px;
}
.bubble .photo-nav .nav-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1.5px solid #e8d5c0; background: #fff;
  cursor: pointer; font-size: 14px; display: flex;
  align-items: center; justify-content: center;
  transition: all var(--transition);
  color: var(--text);
}
.bubble .photo-nav .nav-btn:hover {
  background: var(--primary); color: #fff; border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(232,89,12,0.25);
}
.bubble .photo-nav .nav-btn:disabled { opacity: 0.25; cursor: default; }
.bubble .photo-nav .nav-btn:disabled:hover {
  background: #fff; color: var(--text); border-color: #e8d5c0;
  box-shadow: none;
}
.bubble .photo-nav .counter {
  font-size: 13px; color: var(--text-secondary);
  min-width: 44px; text-align: center; font-weight: 500;
}
.bubble .bubble-footer {
  padding: 10px 16px; border-top: 1px solid #f5efe5;
  display: none;
}
.bubble .bubble-footer.visible { display: flex; justify-content: flex-end; }

/* 管理抽屉 */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  z-index: 30; display: none;
  backdrop-filter: blur(2px);
}
.drawer-overlay.visible { display: block; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 400px; max-width: 90vw;
  background: var(--surface); z-index: 31;
  box-shadow: -4px 0 24px rgba(0,0,0,0.12);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 20px 0 0 20px;
}
.drawer.visible { transform: translateX(0); }
.drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid #f5efe5;
  font-size: 18px; font-weight: 700;
  background: linear-gradient(to bottom, #fff, #fef9f0);
  border-radius: 20px 0 0 0;
}
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 24px; }
.drawer-body .city-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid #f5efe5;
  transition: background var(--transition);
}
.drawer-body .city-item:hover { background: #fef9f0; margin: 0 -12px; padding: 14px 12px; border-radius: 8px; }
.drawer-body .city-item .city-name { font-size: 15px; font-weight: 600; color: var(--text); }
.drawer-body .city-item .city-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.drawer-body .empty-state {
  text-align: center; padding: 60px 0; color: var(--text-secondary);
  font-size: 15px; line-height: 1.8;
}
.drawer-footer {
  padding: 16px 24px; border-top: 1px solid #f5efe5;
  background: linear-gradient(to top, #fff, #fef9f0);
}

/* 添加城市表单 */
.form-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 40; display: none;
  align-items: center; justify-content: center;
  backdrop-filter: blur(3px);
}
.form-overlay.visible { display: flex; }
.form-panel {
  background: var(--surface); border-radius: var(--radius);
  width: 460px; max-width: 94vw; max-height: 85vh;
  overflow-y: auto; padding: 28px;
  box-shadow: var(--shadow-lg);
  animation: bubbleIn 0.25s ease-out;
}
.form-panel h3 {
  margin-bottom: 20px; font-size: 19px; font-weight: 700;
  color: var(--text);
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 6px;
}
.form-group select, .form-group input[type="text"], .form-group input[type="number"] {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid #e8d5c0; border-radius: var(--radius-sm);
  font-size: 14px; outline: none; font-family: inherit;
  background: #fef9f0; transition: all var(--transition);
}
.form-group select:focus, .form-group input:focus {
  border-color: var(--primary);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(232,89,12,0.1);
}
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

/* 城市搜索下拉 */
.city-search-wrapper { position: relative; }
.city-search-wrapper input {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid #e8d5c0; border-radius: var(--radius-sm);
  font-size: 14px; outline: none; font-family: inherit;
  background: #fef9f0; transition: all var(--transition);
}
.city-search-wrapper input:focus {
  border-color: var(--primary); background: #fff;
  box-shadow: 0 0 0 3px rgba(232,89,12,0.1);
}
.city-search-dropdown {
  position: absolute; top: 100%; left: 0; right: 0;
  max-height: 240px; overflow-y: auto;
  background: #fff; border: 1px solid #e8d5c0;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  box-shadow: var(--shadow); z-index: 41; display: none;
}
.city-search-dropdown.visible { display: block; }
.city-search-dropdown .city-option {
  padding: 9px 14px; cursor: pointer; font-size: 13px;
  border-bottom: 1px solid #f5efe5; transition: background 0.15s;
}
.city-search-dropdown .city-option:hover,
.city-search-dropdown .city-option.active { background: #fff5eb; color: var(--primary); }

/* 照片上传区 */
.photo-upload-list { margin-top: 8px; }
.photo-upload-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #f5efe5;
}
.photo-upload-item img {
  width: 64px; height: 64px; object-fit: cover;
  border-radius: 8px; background: #f5efe5;
  box-shadow: var(--shadow-sm);
}
.photo-upload-item .photo-info { flex: 1; }
.photo-upload-item .photo-info input {
  width: 100%; padding: 6px 10px;
  border: 1.5px solid #e8d5c0; border-radius: 6px;
  font-size: 13px; font-family: inherit;
  background: #fef9f0;
}
.photo-upload-item .photo-info input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(232,89,12,0.1);
}
.photo-upload-item .remove-btn {
  background: #fff0e6; border: none; color: var(--danger);
  cursor: pointer; font-size: 16px; padding: 4px 8px;
  border-radius: 6px; transition: all var(--transition);
}
.photo-upload-item .remove-btn:hover { background: #ffe0e0; transform: scale(1.1); }
.file-input-wrapper {
  display: flex; align-items: center; gap: 10px; margin-top: 10px;
}
.file-input-wrapper .file-label {
  padding: 8px 18px;
  border: 2px dashed var(--primary);
  border-radius: 10px;
  cursor: pointer; font-size: 13px; font-weight: 600;
  color: var(--primary);
  transition: all var(--transition);
  background: #fff5eb;
}
.file-input-wrapper .file-label:hover {
  background: var(--primary);
  color: #fff;
  border-style: solid;
}
.file-input-wrapper input[type="file"] { display: none; }

/* 密码弹窗 */
.password-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 50; display: none;
  align-items: center; justify-content: center;
  backdrop-filter: blur(3px);
}
.password-overlay.visible { display: flex; }
.password-panel {
  background: var(--surface); border-radius: var(--radius);
  padding: 32px; width: 360px; max-width: 90vw;
  box-shadow: var(--shadow-lg); text-align: center;
  animation: bubbleIn 0.25s ease-out;
}
.password-panel h3 { margin-bottom: 8px; font-size: 19px; font-weight: 700; }
.password-panel p { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
.password-panel input {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid #e8d5c0; border-radius: var(--radius-sm);
  font-size: 15px; outline: none; margin-bottom: 16px;
  font-family: inherit; background: #fef9f0;
  transition: all var(--transition);
}
.password-panel input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(232,89,12,0.1);
}
.password-panel .error {
  color: var(--danger); font-size: 13px;
  margin-bottom: 10px; display: none; font-weight: 500;
}

/* 响应式 */
@media (max-width: 768px) {
  .header { padding: 10px 14px; }
  .header .logo { font-size: 16px; }
  .header .logo .icon { font-size: 20px; margin-right: 4px; }
  .btn {
    padding: 8px 14px; font-size: 13px;
    min-height: 40px; min-width: 60px;
  }
  .btn-sm { padding: 6px 12px; font-size: 12px; min-height: 34px; }
  .drawer {
    width: 100vw; border-radius: 0;
  }
  .drawer-header, .drawer-footer {
    padding: 16px 18px;
  }
  .drawer-body { padding: 12px 18px; }
  :root { --bubble-width: auto; }
  .bubble {
    max-width: calc(100vw - 24px);
    left: 12px !important;
    right: 12px;
    top: auto !important;
    bottom: 16px;
    width: auto;
  }
  .bubble::after { display: none; }
  .bubble .bubble-header { padding: 12px 14px; font-size: 15px; }
  .bubble .bubble-body { padding: 12px 14px; }
  .bubble .photo-frame { height: 200px; }
  .bubble .photo-nav .nav-btn {
    min-width: 36px; min-height: 36px;
    width: 36px; height: 36px;
  }
  .form-panel { padding: 18px; width: 100%; max-width: 100vw; border-radius: 12px 12px 0 0; }
  .form-overlay { align-items: flex-end; }
  .password-panel { padding: 24px; width: calc(100vw - 32px); }
  .toast { width: 90vw; text-align: center; font-size: 13px; padding: 10px 18px; }

  /* 地图控件适配移动端 */
  #map { touch-action: manipulation; }
}

/* Toast */
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(12px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, #2d2416, #4a3d2e);
  color: #fff; padding: 12px 26px;
  border-radius: 12px; font-size: 14px; z-index: 60;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  font-weight: 500;
}
.toast.visible {
  opacity: 1;
  animation: toastIn 0.3s ease-out;
}
</style>
</head>
<body>
  <!-- 顶部栏 -->
  <header class="header">
    <div class="logo"><span class="icon">🏔️</span>我的旅行足迹</div>
    <div class="actions" id="headerActions">
      <button class="btn btn-outline" id="btnManage" onclick="openManagement()">⚙️ 管理</button>
      <button class="btn btn-outline" id="btnLogout" onclick="logoutEditMode()" style="display:none; color: var(--danger);">退出</button>
    </div>
  </header>

  <!-- 地图 -->
  <div class="map-container">
    <div id="map"></div>
    <!-- 气泡 -->
    <div class="bubble" id="bubble">
      <div class="bubble-header">
        <span id="bubbleCityName"></span>
        <button class="bubble-close" onclick="closeBubble()">×</button>
      </div>
      <div class="bubble-body">
        <div class="photo-frame" id="bubblePhotoFrame">
          <span class="no-photo">🖼️</span>
        </div>
        <div class="photo-desc" id="bubblePhotoDesc"></div>
        <div class="photo-nav" id="bubbleNav">
          <button class="nav-btn" id="bubblePrev" onclick="prevPhoto()">◀</button>
          <span class="counter" id="bubbleCounter">0/0</span>
          <button class="nav-btn" id="bubbleNext" onclick="nextPhoto()">▶</button>
        </div>
      </div>
      <div class="bubble-footer" id="bubbleFooter">
        <button class="btn btn-danger btn-sm" onclick="deleteCurrentPhoto()">🗑 删除照片</button>
      </div>
    </div>
  </div>

  <!-- 管理抽屉 -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <span>⚙️ 管理城市</span>
      <button class="bubble-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer">
      <button class="btn btn-primary" style="width:100%" onclick="openAddCityForm()">+ 添加城市</button>
    </div>
  </div>

  <!-- 添加城市表单 -->
  <div class="form-overlay" id="formOverlay">
    <div class="form-panel">
      <h3 id="formTitle">添加城市</h3>
      <div class="form-group">
        <label>搜索城市（347个地级市可选，或手动输入）</label>
        <div class="city-search-wrapper">
          <input type="text" id="citySearchInput" placeholder="输入城市名搜索，如：丽江" autocomplete="off"
                 oninput="onCitySearch()" onfocus="onCitySearch()" onkeydown="onCitySearchKey(event)">
          <div class="city-search-dropdown" id="citySearchDropdown"></div>
        </div>
      </div>
      <div class="form-group">
        <label>城市名称</label>
        <input type="text" id="cityNameInput" placeholder="如：丽江">
      </div>
      <div style="display:flex; gap:10px;">
        <div class="form-group" style="flex:1">
          <label>纬度</label>
          <input type="number" id="cityLatInput" placeholder="如：26.86" step="any">
        </div>
        <div class="form-group" style="flex:1">
          <label>经度</label>
          <input type="number" id="cityLngInput" placeholder="如：100.23" step="any">
        </div>
      </div>
      <div class="form-group">
        <label>照片（最多 20 张）</label>
        <div class="photo-upload-list" id="photoUploadList"></div>
        <div class="file-input-wrapper">
          <label class="file-label" for="fileInput">📷 选择照片</label>
          <input type="file" id="fileInput" accept="image/*" multiple onchange="onFilesSelected()">
          <span style="font-size:12px;color:var(--text-secondary)" id="fileCount">未选择文件</span>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeAddCityForm()">取消</button>
        <button class="btn btn-primary" id="btnSaveCity" onclick="saveCity()">保存</button>
      </div>
    </div>
  </div>

  <!-- 密码弹窗 -->
  <div class="password-overlay" id="passwordOverlay">
    <div class="password-panel">
      <h3>🔑 输入管理密码</h3>
      <p>请输入密码以进入管理模式</p>
      <input type="password" id="passwordInput" placeholder="管理密码" onkeydown="if(event.key==='Enter')verifyPassword()">
      <div class="error" id="passwordError">密码错误，请重试</div>
      <button class="btn btn-primary" style="width:100%" onclick="verifyPassword()">确认</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
<script>

const ADMIN_PASSWORD_HASH = 'ab86bea4c26d8fe1d4640bcc28c222c99c359b3f1baf791ce54a4b7aba2d1162';

// ====== Supabase 客户端 ======
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ====== 应用状态 ======
let cities = [];             // [{ id, name, lat, lng, photos: [{id, storage_path, description, sort_order}] }]
let currentBubbleCity = null;
let currentPhotoIndex = 0;
let editMode = false;
let pendingPhotos = [];      // 添加城市表单中的待上传照片 [{ file, previewUrl, description }]

// ====== 工具函数 ======
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('visible'), 2500);
}

function isEditMode() { return editMode; }

function closeBubble() {
  document.getElementById('bubble').classList.remove('visible');
  currentBubbleCity = null;
  currentPhotoIndex = 0;
}

// ====== ECharts 地图 ======
let mapChart = null;

async function initMap() {
  const dom = document.getElementById('map');
  mapChart = echarts.init(dom);

  // 使用 china-geo.js 中预加载的 GeoJSON 数据
  echarts.registerMap('china', CHINA_GEOJSON);

  const option = {
    tooltip: {
      trigger: 'item',
      formatter: function(params) {
        if (params.seriesType === 'scatter' || params.seriesType === 'effectScatter') {
          return params.name;
        }
        return '';
      }
    },
    geo: {
      map: 'china',
      roam: true,
      zoom: 1.2,
      center: [104.5, 36],
      label: { show: false },
      itemStyle: {
        areaColor: '#faf1e4',
        borderColor: '#e0c9a6',
        borderWidth: 1,
        shadowColor: 'rgba(0,0,0,0.04)',
        shadowBlur: 8
      },
      emphasis: {
        label: { show: false },
        itemStyle: { areaColor: '#f5e6d0' }
      }
    },
    series: []
  };

  mapChart.setOption(option);

  // 窗口大小变化或屏幕旋转时重绘
  ['resize', 'orientationchange'].forEach(function(evt) {
    window.addEventListener(evt, function() {
      setTimeout(function() {
        mapChart && mapChart.resize();
      }, 200);
      closeBubble();
    });
  });
}

function renderCityMarkers() {
  if (!mapChart) return;

  // 为每个城市创建散点数据
  const scatterData = cities.map(city => ({
    name: city.name,
    value: [city.lng, city.lat, city.id]
  }));

  mapChart.setOption({
    series: [{
      type: 'effectScatter',
      coordinateSystem: 'geo',
      data: scatterData,
      symbolSize: 6,
      showEffectOn: 'render',
      rippleEffect: {
        brushType: 'stroke',
        scale: 3.5,
        period: 4,
        color: '#e8590c'
      },
      itemStyle: { color: '#e8590c' },
      label: { show: false },
      zlevel: 1
    }, {
      type: 'scatter',
      coordinateSystem: 'geo',
      data: scatterData,
      symbolSize: 20,
      symbol: 'pin',
      itemStyle: {
        color: '#e53e3e',
        shadowBlur: 6,
        shadowColor: 'rgba(229,62,62,0.4)',
        shadowOffsetY: 2
      },
      label: {
        show: true,
        formatter: function(p) { return p.name; },
        position: 'right',
        distance: 8,
        fontSize: 13,
        color: '#2d2416',
        fontWeight: 600,
        textShadowColor: 'rgba(255,255,255,0.8)',
        textShadowBlur: 3
      },
      emphasis: {
        scale: 1.5,
        itemStyle: { color: '#c92a2a' }
      },
      zlevel: 2
    }]
  });

  // 点击城市标记 → 显示气泡
  mapChart.off('click');
  mapChart.on('click', function(params) {
    if (params.componentType === 'geo') {
      closeBubble();
    } else if (params.seriesType === 'scatter' || params.seriesType === 'effectScatter') {
      const cityId = params.value[2];
      const city = cities.find(c => c.id === cityId);
      if (city) {
        showBubble(city, params.event.event);
      }
    }
  });
}

// ====== 数据加载 ======
async function loadCities() {
  try {
    const { data, error } = await supabase
      .from('cities')
      .select('id, name, lat, lng, photos(id, storage_path, description, sort_order)')
      .order('created_at', { ascending: true });

    if (error) {
      console.error('Failed to load cities:', error);
      return;
    }

    cities = (data || []).map(city => ({
      ...city,
      photos: (city.photos || []).sort((a, b) => a.sort_order - b.sort_order)
    }));

    renderCityMarkers();
  } catch (err) {
    console.error('Failed to load cities:', err);
  }
}

// ====== 气泡弹窗 ======
function showBubble(city, clickEvent) {
  currentBubbleCity = city;
  currentPhotoIndex = 0;

  const bubble = document.getElementById('bubble');
  const mapContainer = document.querySelector('.map-container');
  const rect = mapContainer.getBoundingClientRect();

  // 兼容鼠标事件和触摸事件
  let clientX, clientY;
  if (clickEvent && typeof clickEvent.clientX === 'number') {
    clientX = clickEvent.clientX;
    clientY = clickEvent.clientY;
  } else if (clickEvent && clickEvent.touches && clickEvent.touches.length > 0) {
    clientX = clickEvent.touches[0].clientX;
    clientY = clickEvent.touches[0].clientY;
  } else if (clickEvent && clickEvent.changedTouches && clickEvent.changedTouches.length > 0) {
    clientX = clickEvent.changedTouches[0].clientX;
    clientY = clickEvent.changedTouches[0].clientY;
  } else {
    // fallback: 弹到容器中央
    clientX = rect.left + rect.width / 2;
    clientY = rect.top + rect.height / 3;
  }

  let left = clientX - rect.left;
  let top = clientY - rect.top;

  // 气泡宽度约 340px，确保不超出屏幕
  const bubbleWidth = Math.min(340, rect.width * 0.9);
  bubble.style.setProperty('--bubble-width', bubbleWidth + 'px');

  if (left + bubbleWidth / 2 > rect.width) {
    left = rect.width - bubbleWidth - 10;
  } else {
    left = left - bubbleWidth / 2;
  }
  if (left < 10) left = 10;

  // 气泡显示在点击位置上方
  top = top - 280; // 气泡高度约 280px
  if (top < 10) top = 10;

  bubble.style.left = left + 'px';
  bubble.style.top = top + 'px';

  renderBubbleContent();

  // 编辑模式下显示删除按钮
  const footer = document.getElementById('bubbleFooter');
  if (editMode) {
    footer.classList.add('visible');
  } else {
    footer.classList.remove('visible');
  }

  bubble.classList.add('visible');
}

function renderBubbleContent() {
  const city = currentBubbleCity;
  if (!city) return;

  document.getElementById('bubbleCityName').textContent = city.name;

  const photoFrame = document.getElementById('bubblePhotoFrame');
  const photoDesc = document.getElementById('bubblePhotoDesc');
  const counter = document.getElementById('bubbleCounter');
  const prevBtn = document.getElementById('bubblePrev');
  const nextBtn = document.getElementById('bubbleNext');

  const photos = city.photos || [];

  if (photos.length === 0) {
    photoFrame.innerHTML = '<span class="no-photo">🖼️</span>';
    photoDesc.textContent = '暂无照片';
    counter.textContent = '0/0';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  const photo = photos[currentPhotoIndex];
  const photoUrl = SUPABASE_URL + '/storage/v1/object/public/picture/' + photo.storage_path;

  const img = document.createElement('img');
  img.src = photoUrl;
  img.alt = photo.description || '';
  img.loading = 'lazy';
  photoFrame.innerHTML = '';
  photoFrame.appendChild(img);
  photoDesc.textContent = photo.description || '';
  counter.textContent = `${currentPhotoIndex + 1}/${photos.length}`;
  prevBtn.disabled = currentPhotoIndex === 0;
  nextBtn.disabled = currentPhotoIndex >= photos.length - 1;
}

function prevPhoto() {
  if (!currentBubbleCity) return;
  const total = (currentBubbleCity.photos || []).length;
  if (total === 0) return;
  currentPhotoIndex = Math.max(0, currentPhotoIndex - 1);
  renderBubbleContent();
}

function nextPhoto() {
  if (!currentBubbleCity) return;
  const total = (currentBubbleCity.photos || []).length;
  if (total === 0) return;
  currentPhotoIndex = Math.min(total - 1, currentPhotoIndex + 1);
  renderBubbleContent();
}

async function deleteCurrentPhoto() {
  if (!currentBubbleCity || !editMode) return;
  const photos = currentBubbleCity.photos || [];
  if (photos.length === 0) return;
  if (currentPhotoIndex >= photos.length) currentPhotoIndex = photos.length - 1;
  const photo = photos[currentPhotoIndex];
  if (!confirm(`确定删除照片「${photo.description || '未命名'}」吗？`)) return;

  await deletePhotoFromSupabase(currentBubbleCity.id, photo);
  showToast('照片已删除');
}

// ====== 认证 ======
function openManagement() {
  if (editMode) {
    // 已登录，直接打开管理抽屉
    openDrawer();
    return;
  }
  // 未登录，弹出密码框
  document.getElementById('passwordOverlay').classList.add('visible');
  document.getElementById('passwordInput').value = '';
  document.getElementById('passwordError').style.display = 'none';
  setTimeout(() => document.getElementById('passwordInput').focus(), 100);
}

async function verifyPassword() {
  const input = document.getElementById('passwordInput').value;
  if (!input) return;

  const hash = await sha256(input);

  if (hash === ADMIN_PASSWORD_HASH) {
    editMode = true;
    localStorage.setItem('travel_map_edit_mode', '1');
    document.getElementById('passwordOverlay').classList.remove('visible');
    document.getElementById('btnManage').textContent = '⚙️ 管理（已登录）';
    document.getElementById('btnManage').classList.add('btn-primary');
    document.getElementById('btnManage').classList.remove('btn-outline');
    document.getElementById('btnLogout').style.display = '';
    showToast('已进入管理模式');
    openDrawer();
  } else {
    document.getElementById('passwordError').style.display = 'block';
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
  }
}

function logoutEditMode() {
  editMode = false;
  localStorage.removeItem('travel_map_edit_mode');
  document.getElementById('btnManage').textContent = '⚙️ 管理';
  document.getElementById('btnManage').classList.remove('btn-primary');
  document.getElementById('btnManage').classList.add('btn-outline');
  document.getElementById('btnLogout').style.display = 'none';
  document.getElementById('bubbleFooter').classList.remove('visible');
  closeDrawer();
  closeAddCityForm();
  closeBubble();
  showToast('已退出管理模式');
}

// ====== 管理抽屉 ======
function openDrawer() {
  renderDrawerList();
  document.getElementById('drawer').classList.add('visible');
  document.getElementById('drawerOverlay').classList.add('visible');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('visible');
  document.getElementById('drawerOverlay').classList.remove('visible');
}

function renderDrawerList() {
  const body = document.getElementById('drawerBody');
  if (cities.length === 0) {
    body.innerHTML = '<div class="empty-state">🏙️<br>还没有添加城市<br>点击下方按钮开始</div>';
    return;
  }

  body.innerHTML = cities.map(city => `
    <div class="city-item">
      <div>
        <div class="city-name">📍 ${escapeHtml(city.name)}</div>
        <div class="city-meta">${(city.photos || []).length} 张照片</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteCity('${city.id}')">删除</button>
    </div>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function deleteCity(cityId) {
  const city = cities.find(c => c.id === cityId);
  if (!city) return;
  if (!confirm(`确定删除「${city.name}」及其所有照片吗？此操作不可恢复。`)) return;

  // 删除存储文件（尽力而为）
  for (const photo of (city.photos || [])) {
    const { error: storageErr } = await supabase.storage.from('picture').remove([photo.storage_path]);
    if (storageErr) {
      console.error('Failed to delete storage file:', photo.storage_path, storageErr);
    }
  }
  // 删除照片数据库记录
  const { error: photosDelError } = await supabase.from('photos').delete().eq('city_id', cityId);
  if (photosDelError) {
    console.error('Failed to delete photo records:', photosDelError);
  }
  // 删除城市记录
  const { error } = await supabase.from('cities').delete().eq('id', cityId);

  if (error) {
    showToast('删除失败: ' + error.message);
    return;
  }

  // 从本地状态移除
  cities = cities.filter(c => c.id !== cityId);
  renderCityMarkers();
  renderDrawerList();
  closeBubble();
  showToast(`已删除「${city.name}」`);
}

// ====== 添加城市表单 ======
// ====== 城市搜索 ======
function onCitySearch() {
  const input = document.getElementById('citySearchInput');
  const dropdown = document.getElementById('citySearchDropdown');
  const query = input.value.trim().toLowerCase();
  const existingNames = cities.map(c => c.name);
  const available = PRESET_CITIES.filter(c => !existingNames.includes(c.name));

  let matches;
  if (query === '') {
    matches = available.slice(0, 50); // show first 50 by default
  } else {
    matches = available.filter(c => c.name.toLowerCase().includes(query)).slice(0, 30);
  }

  if (matches.length === 0) {
    dropdown.innerHTML = '<div class="no-result">未找到匹配城市，请直接输入城市名和经纬度</div>';
  } else {
    dropdown.innerHTML = matches.map(c =>
      `<div class="city-option" onclick="selectCity('${c.name}',${c.lat},${c.lng})">${c.name}</div>`
    ).join('');
  }
  dropdown.classList.add('visible');
}

function onCitySearchKey(e) {
  const dropdown = document.getElementById('citySearchDropdown');
  if (e.key === 'Escape') { dropdown.classList.remove('visible'); return; }
  if (e.key === 'Enter') {
    const first = dropdown.querySelector('.city-option');
    if (first) first.click();
    dropdown.classList.remove('visible');
  }
}

function selectCity(name, lat, lng) {
  document.getElementById('citySearchInput').value = name;
  document.getElementById('cityNameInput').value = name;
  document.getElementById('cityLatInput').value = lat;
  document.getElementById('cityLngInput').value = lng;
  document.getElementById('citySearchDropdown').classList.remove('visible');
}

// 点击其他地方关闭搜索下拉
document.addEventListener('click', function(e) {
  const wrapper = document.querySelector('.city-search-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('citySearchDropdown').classList.remove('visible');
  }
});

function openAddCityForm() {
  document.getElementById('citySearchInput').value = '';
  document.getElementById('cityNameInput').value = '';
  document.getElementById('cityLatInput').value = '';
  document.getElementById('cityLngInput').value = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('fileCount').textContent = '未选择文件';
  document.getElementById('citySearchDropdown').classList.remove('visible');
  pendingPhotos = [];
  renderPhotoUploadList();

  document.getElementById('formOverlay').classList.add('visible');
  document.getElementById('btnSaveCity').disabled = false;
  setTimeout(() => document.getElementById('citySearchInput').focus(), 150);
}

function onFilesSelected() {
  const files = Array.from(document.getElementById('fileInput').files);
  const currentCount = pendingPhotos.length;

  if (currentCount + files.length > 20) {
    showToast('每个城市最多 20 张照片');
    document.getElementById('fileInput').value = '';
    return;
  }

  for (const file of files) {
    pendingPhotos.push({
      file: file,
      previewUrl: URL.createObjectURL(file),
      description: ''
    });
  }

  document.getElementById('fileInput').value = '';
  document.getElementById('fileCount').textContent = `已选 ${pendingPhotos.length} 张`;
  renderPhotoUploadList();
}

function renderPhotoUploadList() {
  const container = document.getElementById('photoUploadList');
  if (pendingPhotos.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = pendingPhotos.map((p, i) => `
    <div class="photo-upload-item">
      <img src="${p.previewUrl}" alt="预览">
      <div class="photo-info">
        <input type="text" placeholder="照片描述（可选）" value="${escapeHtml(p.description)}"
               onchange="pendingPhotos[${i}].description = this.value">
      </div>
      <button class="remove-btn" onclick="removePendingPhoto(${i})" title="移除">×</button>
    </div>
  `).join('');
}

function removePendingPhoto(index) {
  URL.revokeObjectURL(pendingPhotos[index].previewUrl);
  pendingPhotos.splice(index, 1);
  document.getElementById('fileCount').textContent = `已选 ${pendingPhotos.length} 张`;
  renderPhotoUploadList();
}

async function saveCity() {
  const name = document.getElementById('cityNameInput').value.trim();
  const lat = parseFloat(document.getElementById('cityLatInput').value);
  const lng = parseFloat(document.getElementById('cityLngInput').value);

  if (!name) { showToast('请输入城市名称'); return; }
  if (isNaN(lat) || isNaN(lng)) { showToast('请输入有效的经纬度'); return; }
  if (lat < 18 || lat > 54 || lng < 73 || lng > 135) {
    if (!confirm('经纬度似乎不在中国范围内，确定继续吗？')) return;
  }

  const btn = document.getElementById('btnSaveCity');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    // 1. 插入城市记录
    const { data: cityData, error: cityError } = await supabase
      .from('cities')
      .insert({ name, lat, lng })
      .select('id')
      .single();

    if (cityError) throw new Error('创建城市失败: ' + cityError.message);

    const cityId = cityData.id;

    // 2. 上传照片
    const uploadedPhotos = [];
    for (let i = 0; i < pendingPhotos.length; i++) {
      const p = pendingPhotos[i];
      const ext = p.file.name.split('.').pop() || 'jpg';
      const storagePath = `${cityId}/${Date.now()}_${i}.${ext}`;

      const { error: uploadError } = await supabase.storage
        .from('picture')
        .upload(storagePath, p.file, {
          cacheControl: '31536000',
          upsert: false
        });

      if (uploadError) {
        console.error('上传失败:', uploadError);
        continue;
      }

      uploadedPhotos.push({
        city_id: cityId,
        storage_path: storagePath,
        description: p.description || '',
        sort_order: i
      });
    }

    // 3. 批量插入照片记录并获取真实 ID
    let photoRecords = [];
    if (uploadedPhotos.length > 0) {
      const { data: inserted, error: photosError } = await supabase
        .from('photos')
        .insert(uploadedPhotos)
        .select('id, storage_path, description, sort_order');
      if (!photosError && inserted) {
        photoRecords = inserted;
      }
    }

    // 4. 更新本地状态
    const newCity = {
      id: cityId,
      name,
      lat,
      lng,
      photos: photoRecords.map(p => ({
        id: p.id,
        storage_path: p.storage_path,
        description: p.description || '',
        sort_order: p.sort_order
      }))
    };
    cities.push(newCity);
    renderCityMarkers();
    renderDrawerList();
    closeAddCityForm();
    const failedCount = pendingPhotos.length - uploadedPhotos.length;
    const msg = failedCount > 0
      ? `已添加「${name}」，${uploadedPhotos.length} 张成功，${failedCount} 张失败`
      : `已添加「${name}」，共 ${uploadedPhotos.length} 张照片`;
    showToast(msg);
  } catch (err) {
    showToast(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '保存';
  }
}

async function deletePhotoFromSupabase(cityId, photo) {
  try {
    // 从 Storage 删除
    await supabase.storage.from('picture').remove([photo.storage_path]);
    // 从 photos 表删除
    await supabase.from('photos').delete().eq('id', photo.id);

    // 更新本地状态
    const city = cities.find(c => c.id === cityId);
    if (city) {
      city.photos = city.photos.filter(p => p.id !== photo.id);
      if (currentPhotoIndex >= city.photos.length) {
        currentPhotoIndex = Math.max(0, city.photos.length - 1);
      }
      if (city.photos.length === 0) {
        closeBubble();
      } else {
        renderBubbleContent();
      }
      renderDrawerList();
      renderCityMarkers();
    }
  } catch (err) {
    showToast('删除失败: ' + err.message);
  }
}

// ====== 初始化 ======
document.addEventListener('DOMContentLoaded', async function() {
  // 恢复登录态
  if (localStorage.getItem('travel_map_edit_mode') === '1') {
    editMode = true;
    document.getElementById('btnManage').textContent = '⚙️ 管理（已登录）';
    document.getElementById('btnManage').classList.add('btn-primary');
    document.getElementById('btnManage').classList.remove('btn-outline');
    document.getElementById('btnLogout').style.display = '';
  }
  await initMap();
  await loadCities();

  // 全局 ESC 键关闭弹窗
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeBubble();
      closeDrawer();
      closeAddCityForm();
    }
  });
});
